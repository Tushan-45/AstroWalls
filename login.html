<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AstroWalls</title>
    <link rel="icon" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="auth-wrapper">

        <div class="brand">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <rect x="1" y="1" width="8" height="8" rx="2" fill="#d9ff3f"/>
                    <rect x="11" y="1" width="8" height="8" rx="2" fill="#d9ff3f" opacity="0.5"/>
                    <rect x="1" y="11" width="8" height="8" rx="2" fill="#d9ff3f" opacity="0.5"/>
                    <rect x="11" y="11" width="8" height="8" rx="2" fill="#d9ff3f" opacity="0.3"/>
                </svg>
            </div>
            <span class="brand-name">AstroWalls</span>
        </div>

        <div class="auth-box">

            <div class="auth-header">
                <h1 id="title">Welcome back</h1>
                <p id="subtitle" class="auth-subtitle">Sign in to your account to continue</p>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                    </svg>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    <button class="toggle-password" id="togglePwd" type="button" aria-label="Toggle password visibility">
                        <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <a href="#" id="forgotLink" class="forgot-link"></a>
            <br>

            <button id="authBtn" class="auth-btn">
                <span id="btnText">Sign In</span>
                <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>

            <div class="divider"><span>or</span></div>

            <p class="auth-footer">
                <span id="text">Don't have an account?</span>
                <a href="#" id="toggle">Create one</a>
            </p>

        </div>

    </div>

    <script type="module" src="login.js"></script>
    <script>
        const togglePwd = document.getElementById('togglePwd');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePwd.addEventListener('click', () => {
            const isText = passwordInput.type === 'text';
            passwordInput.type = isText ? 'password' : 'text';
            eyeIcon.innerHTML = isText
                ? '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>'
                : '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>';
        });
    </script>

</body>
</html>
